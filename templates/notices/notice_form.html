{% extends 'base.html' %}
{% block title %}{{ title }} - HMS{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3"><label class="form-label">Title *</label>{{ form.title }}</div>
                    <div class="mb-3"><label class="form-label">Content *</label>{{ form.content }}</div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">Target Audience</label>{{ form.target }}</div>
                        <div class="col-md-6 mb-3 d-flex align-items-end">
                            <div class="form-check">
                                {{ form.is_important }}
                                <label class="form-check-label ms-2">Mark as Important</label>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>{{ button_text }}</button>
                        <a href="{% url 'notices:list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
