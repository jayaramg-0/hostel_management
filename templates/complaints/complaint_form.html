{% extends 'base.html' %}
{% block title %}{{ title }} - HMS{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Category *</label>
                        {{ form.category }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subject *</label>
                        {{ form.subject }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description *</label>
                        {{ form.description }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>{{ button_text }}</button>
                        <a href="{% url 'complaints:list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
