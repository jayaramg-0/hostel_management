{% extends 'base.html' %}
{% block title %}Apply Leave - HMS{% endblock %}
{% block page_title %}Apply for Leave{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3"><label class="form-label">Leave Type *</label>{{ form.leave_type }}</div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">From Date *</label>{{ form.from_date }}</div>
                        <div class="col-md-6 mb-3"><label class="form-label">To Date *</label>{{ form.to_date }}</div>
                    </div>
                    <div class="mb-3"><label class="form-label">Reason *</label>{{ form.reason }}</div>
                    <div class="mb-3"><label class="form-label">Contact During Leave</label>{{ form.contact_during_leave }}</div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-send me-2"></i>Submit Request</button>
                        <a href="{% url 'leave_requests:list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
